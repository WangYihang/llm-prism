version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: llm-redactor-exec
    env:
      - CGO_ENABLED=0
    binary: llm-redactor-exec
    main: ./cmd/llm-redactor-exec
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s
      - -w
      - -X github.com/wangyihang/llm-redactor/pkg/version.Version={{.Version}}
      - -X github.com/wangyihang/llm-redactor/pkg/version.Commit={{.Commit}}
      - -X github.com/wangyihang/llm-redactor/pkg/version.Date={{.Date}}

  - id: llm-redactor-proxy
    env:
      - CGO_ENABLED=0
    binary: llm-redactor-proxy
    main: ./cmd/llm-redactor-proxy
    goos:
      - linux
      - windows
      - darwin
    ldflags:
      - -s
      - -w
      - -X github.com/wangyihang/llm-redactor/pkg/version.Version={{.Version}}
      - -X github.com/wangyihang/llm-redactor/pkg/version.Commit={{.Commit}}
      - -X github.com/wangyihang/llm-redactor/pkg/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  disable: true
  format: '{{ .SHA }} {{ .Message }}'

checksum:
  name_template: "{{ .ProjectName }}_checksums.txt"
  algorithm: sha256

release:
  mode: replace

report_sizes: true
